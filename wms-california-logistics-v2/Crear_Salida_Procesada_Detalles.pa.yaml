                    "
                  Width: =527
                  X: =66
                  Y: =11
            - btnSiAgregarDetalle_4:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =Font.Verdana
                  Height: =42
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: "=// =========================================================================\n// 1. Capture Form2's Current State Safely\n// =========================================================================\nUpdateContext({\n    varFormDatosSalida: {\n        // Renamed to match downstream use and strictly outputting Text\n        Proveedor: Coalesce(\n            ddProveedorForm.Selected.Title, \n            Concat(Distinct(ColectarEntradas, Nombre_Proveedor), Value, \", \")\n        ),\n        Observaciones: txtObservacionesForm.Text,\n        Estado: ddEstadoForm.Selected.Value,\n        Fecha_Salida_Pronosticada: If(\n            ddEstadoForm.Selected.Value = \"Pendiente\", \n            dpFechaPronosticadaField.SelectedDate, \n            Blank()\n        )\n    }\n});\n\n// =========================================================================\n// 2. Create the Enriched Master Record in WMS_Ordenes_Salidas\n// =========================================================================\nSet(\n    varSalidaActual,\n    Patch(\n        WMS_Ordenes_Salidas,\n        Defaults(WMS_Ordenes_Salidas),\n        {\n            Numero_Salida: varNuevoNumSalida,\n            Numero_Entradas: Concat(Distinct(ColectarBultos, Numero_Entrada), Value, \", \"),\n            Guia: Concat(Distinct(ColectarBultos, Guia), Value, \", \"),\n            Clientes: Concat(Distinct(ColectarBultos, Cliente), Value, \", \"),\n            Cantidad_Bultos: CountRows(ColectarBultos),\n            \n            // FIXED: Directly referencing the text string property from the variable\n            Proveedor: varFormDatosSalida.Proveedor,\n            Observaciones: varFormDatosSalida.Observaciones,\n            Estado: varFormDatosSalida.Estado,\n            Fecha_Salida_Pronosticada: varFormDatosSalida.Fecha_Salida_Pronosticada,\n\n            Fecha_Salida_Creada: Now(),\n            Fecha_Salida_Procesada: If(varFormDatosSalida.Estado = \"Procesada\", Now(), Blank())\n        }\n    )\n);\n\n// =========================================================================\n// 3. High-Performance Bulk Patch for Child Details (WMS_Salidas_Detalles)\n// =========================================================================\nPatch(\n    WMS_Salidas_Detalles,\n    ForAll(\n        ColectarBultos As _bulto,\n        {\n            Numero_Salida: varNuevoNumSalida,\n            Numero_Bulto: _bulto.Numero_Caja, \n            Numero_Entrada: _bulto.Numero_Entrada\n        }\n    )\n);\n\n// =========================================================================\n// 4. Clean up Inventory Sources (Deletions & Updates)\n// =========================================================================\nForAll(\n    ColectarEntradas As _entrada,\n    With(\n        {\n            TotalEnSource: CountRows(Filter(WMS_Detalle_Cajas, Numero_Entrada = _entrada.Numero_Entrada)),\n            Seleccionados: CountRows(Filter(ColectarBultos, Numero_Entrada = _entrada.Numero_Entrada)),\n            TargetEntradaRecord: LookUp(WMS_Ordenes_Entrantes, Numero_Entrada = _entrada.Numero_Entrada)\n        },\n        \n        // --- SCENARIO A: ALL BULTOS SELECTED ---\n        If(\n            TotalEnSource = Seleccionados,\n            Remove(WMS_Ordenes_Entrantes, TargetEntradaRecord);\n            RemoveIf(WMS_Detalle_Cajas, Numero_Entrada = _entrada.Numero_Entrada)\n        );\n        \n        // --- SCENARIO B: PARTIAL BULTOS SELECTED ---\n        If(\n            TotalEnSource <> Seleccionados,\n            RemoveIf(\n                WMS_Detalle_Cajas,\n                Numero_Entrada = _entrada.Numero_Entrada And\n                !IsBlank(\n                    LookUp(\n                        ColectarBultos,\n                        Numero_Caja = WMS_Detalle_Cajas[@Numero_Caja] And Numero_Entrada = _entrada.Numero_Entrada\n                    )\n                )\n            );\n            Patch(\n                WMS_Ordenes_Entrantes,\n                TargetEntradaRecord,\n                {\n                    Cantidad_bultos: TotalEnSource - Seleccionados\n                }\n            )\n        )\n    )\n);\n\n// =========================================================================\n// 5. Clean up Workspace State & Navigate\n// =========================================================================\nResetForm(Form2);\n\nClear(ColectarBultos);\nClear(ColectarEntradas);\n\nUpdateContext({varMostrarConfirmacionPopup: false});\n\nNotify(\"Salida \" & varNuevoNumSalida & \" creada exitosamente\", NotificationType.Success);\nNavigate(Salidas_Procesadas, ScreenTransition.Cover)"
