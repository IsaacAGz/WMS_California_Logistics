            OnSelect: "=If(\n    IsEmpty(ColectarBultos),\n    Notify(\"Error: No se han seleccionado bultos para procesar la salida.\", NotificationType.Error),\n    \n    UpdateContext({\n        varMostrarConfirmacionPopup: true,\n        // Using an absolute timestamp marker (MinuteSecond) ensures uniqueness before the DB generates the actual record ID\n        varNuevoNumSalida: \"SAL-\" & Text(Now(), \"mmddyy-hhmmss\")\n    })\n)"
