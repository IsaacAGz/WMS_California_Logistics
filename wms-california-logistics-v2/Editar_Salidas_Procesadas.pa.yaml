            - 01_Button_Registrar_Entrada_4:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =varGlobal_Fuente_Principal
                  Height: |
                    =42
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: "=If(\n    IsBlank(cmbEditCliente_1.Selected.Nombre_Cliente),\n    Notify(\"Falta seleccionar cliente\", NotificationType.Error),\n    If(\n        IsBlank(cmbEditProveedor_1.Selected.Nombre),\n        Notify(\"Falta seleccionar proveedor\", NotificationType.Error),\n        If(\n            IsBlank(txtEditCantidadBultos_1.Value) || txtEditCantidadBultos_1.Value <= 0,\n            Notify(\"Cantidad de bultos inválida\", NotificationType.Error),\n            \n            // 1. Calculate if the operator increased the total bultos count\n            // We compare the new input value against the rows currently in our staging collection\n            UpdateContext({\n                varBultosAumentados: txtEditCantidadBultos_1.Value > CountRows(colDetalleCajasStaging)\n            });\n\n            // 2. Commit the header updates to SharePoint\n            Patch(\n                WMS_Ordenes_Entrantes,\n                varEntradaEditar,\n                {\n                    Nombre_Cliente: cmbEditCliente_1.Selected.Nombre_Cliente,\n                    Nombre_Proveedor: cmbEditProveedor_1.Selected.Nombre,\n                    Cantidad_bultos: txtEditCantidadBultos_1.Value,\n                    Guia: Value(txtEditGuia_1.Text),\n                    Observaciones: txtEditObservaciones_1.Text\n                }\n            );\n\n            // 3. Refresh our global record reference with the newly saved data\n            Set(\n                varEntradaEditar,\n                LookUp(\n                    WMS_Ordenes_Entrantes,\n                    Numero_Entrada = varEntradaEditar.Numero_Entrada\n                )\n            );\n\n            // 4. Clear input fields\n            Reset(cmbEditCliente_1);\n            Reset(cmbEditProveedor_1);\n            Reset(txtEditCantidadBultos_1);\n            Reset(txtEditGuia_1);\n            Reset(txtEditObservaciones_1);\n            Notify(\"Entrada guardada correctamente\", NotificationType.Success);\n\n            // 5. Smart Routing: Show popup if bultos increased, otherwise go straight Back\n            If(\n                varBultosAumentados,\n                UpdateContext({ varMostrarPopupBultos: true }),\n                Back()\n            )\n        )\n    )\n)"
                  PressedBorderColor: =Self.Fill
