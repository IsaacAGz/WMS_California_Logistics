                  OnSelect: |-
                    =// 1. Hide the popup layout
                    UpdateContext({ varMostrarPopupBultos: false });

                    // 2. Sync session variables with the updated record state
                    Set(varNumeroEntrada, varEntradaEditar.Numero_Entrada);
                    Set(varTotalCajas, varEntradaEditar.Cantidad_bultos);
                    Set(varModoEditarDetalleEntrada, true);
                    Set(varEntradaActual, varEntradaEditar);
                    Set(varEstadoDetalleOriginal, varEntradaEditar.Estado_Detalle);

                    // 3. Initialize collection state if empty (preserves text updates)
                    If(
                        IsEmpty(colDetalleCajasStaging),
                        ClearCollect(
                            colDetalleCajasStaging, 
                            Filter(WMS_Detalle_Cajas, Numero_Entrada = varEntradaEditar.Numero_Entrada)
                        );
                        Set(varTotalCajasOriginales, CountRows(colDetalleCajasStaging))
                    );

                    // 4. Update status to locking phase
                    Patch(
                        WMS_Ordenes_Entrantes,
                        varEntradaActual,
                        { Estado_Detalle: "En captura" }
                    );

                    // 5. Route the user over
                    Navigate(scrDetalleCajasEntrada, ScreenTransition.Cover)
