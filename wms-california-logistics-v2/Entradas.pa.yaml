                        Icon: =Icon.Edit
                        OnSelect: |-
                          =Set(varEntradaEditar, ThisItem);

                          Set(varEstadoDetalleOriginal, ThisItem.Estado_Detalle);

                          // Clear the staging collection and pre-load it with the boxes already saved in SharePoint
                          ClearCollect(
                              colDetalleCajasStaging, 
                              Filter(WMS_Detalle_Cajas, Numero_Entrada = ThisItem.Numero_Entrada)
                          );

                          Set(varTotalCajasOriginales, CountRows(colDetalleCajasStaging));

                          Navigate(Editar_Entradas, ScreenTransition.Cover)
                        PaddingBottom: =16
                        PaddingLeft: =16
                        PaddingRight: =16
                        PaddingTop: =16
