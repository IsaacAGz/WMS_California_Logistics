            - 01_Button_Registrar_Entrada_1:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =varGlobal_Fuente_Principal
                  Height: =50
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: "=// 1. Save the initial form state so it's safely held in memory during navigation\nUpdateContext({\n    varFormDatosSalida: {\n        Proveedor: ddProveedorForm.Selected.Title, \n        Observaciones: txtObservacionesForm.Text,\n        Estado: ddEstadoForm.Selected.Value,\n        Fecha_Salida_Pronosticada: If(\n            ddEstadoForm.Selected.Value = \"Pendiente\", \n            dpFechaPronosticadaField.SelectedDate, \n            Blank()\n        )\n    }\n});\n\n// 2. Validate and navigate safely (Fixed the semicolon syntax error)\nIf(\n    IsEmpty(ColectarEntradas),\n    Notify(\"Seleccionar Entradas para continuar.\", NotificationType.Error),\n    \n    // Success path actions must be separated by semicolons within the If block\n    Reset(buscador_entradas_1);\n    Navigate(Crear_Salida_Procesada_Detalles, ScreenTransition.Cover)\n)"
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Text: ="Continuar"
                  Width: =235
                  X: =444
                  Y: =208
