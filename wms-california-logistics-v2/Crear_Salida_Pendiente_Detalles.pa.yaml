            OnSelect: "=If(\n    IsEmpty(ColectarBultos),\n    // Validation Failure: Warn the user and halt execution\n    Notify(\"Error: No se han seleccionado bultos para procesar la salida.\", NotificationType.Error),\n    \n    // Validation Success: Generate IDs and open the confirmation pop-up\n    UpdateContext({\n        varMostrarConfirmacionPopup: true,\n        varNuevoNumSalida: \"SAL-\" & Text(Today(), \"mmddyy\") & \"-\" & Text(varSalidaActual.ID, \"0000\")\n    })\n)"
