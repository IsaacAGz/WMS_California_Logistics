                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =Font.Verdana
                  Height: =42
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: "=// 1. Create the enriched master record in SharePoint\n\nSet(\n\n    varSalidaActual,\n\n    Patch(\n\n        WMS_Ordenes_Salidas,\n\n        Defaults(WMS_Ordenes_Salidas),\n\n        {\n\n            Numero_Salida: varNuevoNumSalida,\n\n            Numero_Entradas: Concat(Distinct(ColectarBultos, Numero_Entrada), Value, \", \"),\n\n            Guia: Concat(Distinct(ColectarBultos, Guia), Value, \", \"),\n\n            Clientes: Concat(Distinct(ColectarBultos, Cliente), Value, \", \"),\n\n            Cantidad_Bultos: CountRows(ColectarBultos),\n\n            Observaciones: \"\", // Assumes an input control name; adjust if necessary\n\n            Fecha_Salida_Creada: Now(),\n\n            Fecha_Salida_Pronosticada: Now(), // Assumes a date picker control; adjust if necessary\n\n            Estado: \"Procesada\",\n\n            Fecha_Salida_Procesada: Now()\n\n            // Note: Foto can be attached here or handled via form/attachments depending on your data schema\n\n        }\n\n    )\n\n);\n\n\n// 2. Insert rows into the child details table (WMS_Salida_Detalles) from ColectarBultos\n\nForAll(\n\n    ColectarBultos As _bulto,\n\n    Patch(\n\n        WMS_Salidas_Detalles,\n\n        Defaults(WMS_Salidas_Detalles),\n\n        {\n\n            Numero_Salida: varNuevoNumSalida,\n\n            Numero_Bulto: _bulto.Numero_Caja, // Assumes collection uses Numero_Caja or mapping equivalent\n\n            Numero_Entrada: _bulto.Numero_Entrada\n\n            // Foto: _bulto.Foto // Pass structural photo binary reference if retained in staging collection\n\n        }\n\n    )\n\n);\n\n\n// 3. Loop through and execute inventory source cleanups (Removals & Updates)\n\nForAll(\n\n    ColectarEntradas As _entrada,\n\n   \n\n    With(\n\n        {\n\n            TotalEnSource: CountRows(Filter(WMS_Detalle_Cajas, Numero_Entrada = _entrada.Numero_Entrada)),\n\n            Seleccionados: CountRows(Filter(ColectarBultos, Numero_Entrada = _entrada.Numero_Entrada)),\n\n            TargetEntradaRecord: LookUp(WMS_Ordenes_Entrantes, Numero_Entrada = _entrada.Numero_Entrada)\n\n        },\n\n       \n\n        // --- SCENARIO A: ALL BULTOS SELECTED ---\n\n        If(\n\n            TotalEnSource = Seleccionados,\n\n            Remove(WMS_Ordenes_Entrantes, TargetEntradaRecord)\n\n        );\n\n        If(\n\n            TotalEnSource = Seleccionados,\n\n            RemoveIf(WMS_Detalle_Cajas, Numero_Entrada = _entrada.Numero_Entrada)\n\n        );\n\n       \n\n        // --- SCENARIO B: PARTIAL BULTOS SELECTED ---\n\n        If(\n\n            TotalEnSource <> Seleccionados,\n\n            RemoveIf(\n\n                WMS_Detalle_Cajas,\n\n                Numero_Entrada = _entrada.Numero_Entrada And\n\n                !IsBlank(\n\n                    LookUp(\n\n                        Filter(ColectarBultos, Numero_Entrada = _entrada.Numero_Entrada),\n\n                        Numero_Caja = WMS_Detalle_Cajas[@Numero_Caja]\n\n                    )\n\n                )\n\n            )\n\n        );\n\n        If(\n\n            TotalEnSource <> Seleccionados,\n\n            Patch(\n\n                WMS_Ordenes_Entrantes,\n\n                TargetEntradaRecord,\n\n                {\n\n                    Cantidad_bultos: TotalEnSource - Seleccionados\n\n                }\n\n            )\n\n        )\n\n    )\n\n);\n\n\n// 4. Clear the staging collection tables\n\nClear(ColectarBultos);\n\nClear(ColectarEntradas);\n\n\n// 5. Close the pop-up modal interface\n\nUpdateContext({varMostrarConfirmacionPopup: false});\n\n\n// 6. Provide feedback and redirect the user\n\nNotify(\"Salida \" & varNuevoNumSalida & \" creada exitosamente\", NotificationType.Success);\n\nNavigate(Salidas_Procesadas, ScreenTransition.Cover) "
