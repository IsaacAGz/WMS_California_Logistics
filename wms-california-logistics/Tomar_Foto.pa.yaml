            StreamRate: =100
            Width: =723
            X: =321
            Y: =106
      - Circle1:
          Control: Circle
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderThickness: =5
            DisabledFill: =RGBA(255, 255, 255, 1)
            Fill: =varGlobal_Color_Principal
            HoverFill: =ColorFade(Self.Fill, -20%)
            OnSelect: |
              =UpdateContext({
                  varPreviewImage: Camera1.Stream,
                  varImageTaken: true
              });
            Visible: =!varImageTaken
            X: =632
            Y: =617
      - Image7:
