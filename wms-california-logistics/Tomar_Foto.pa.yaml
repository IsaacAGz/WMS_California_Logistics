            Width: =723
            X: =321
            Y: =106
      - 01_Button_Nueva_Plantilla_11:
          Control: Classic/Button
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =varGlobal_Color_Principal
            Font: =varGlobal_Fuente_Principal
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(Self.Fill, -20%)
            OnSelect: |-
              =UpdateContext({varImageTaken: false})
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =20
            RadiusBottomRight: =20
            RadiusTopLeft: =20
            RadiusTopRight: =20
            Text: ="Retomar"
            Visible: =varImageTaken
            Width: =320
            X: =321
            Y: =677
      - 01_Button_Nueva_Plantilla_12:
          Control: Classic/Button
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =varGlobal_Color_Principal
            Font: =varGlobal_Fuente_Principal
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(Self.Fill, -20%)
            OnSelect: |-
              =If(
                  !IsBlank(varCajaFotoEditar.ID),
                  Patch(
                      WMS_Detalle_Cajas,
                      LookUp(WMS_Detalle_Cajas, ID = varCajaFotoEditar.ID),
                      { Foto: varPreviewImage }
                  ),
                  Patch(
                      colDetalleCajasStaging,
                      varCajaFotoEditar,
                      { Foto: varPreviewImage }
                  )
              );
              UpdateContext({varPreviewImage: Blank()});
              UpdateContext({varImageTaken: false});
              Back()
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =20
            RadiusBottomRight: =20
            RadiusTopLeft: =20
            RadiusTopRight: =20
            Text: ="Guardar"
            Visible: =varImageTaken
            Width: =320
            X: =732
            Y: =677
