                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: "=If(\n    editar_proveedores.Valid,\n    \n    // 1. Check for duplicates, ignoring the record currently being updated\n    If(\n        !IsBlank(\n            LookUp(\n                WMS_Catalogo_Proveedor, \n                'Title' = campo_nombre_proveedor.Text && \n                ID <> varProvedorSeleccionado.ID\n            )\n        ),\n        \n        // 2. TRUE action: A completely different provider already claims this name\n        Notify(\n            \"Error: Ya existe otro proveedor con este Nombre.\", \n            NotificationType.Error\n        ),\n        \n        // 3. FALSE action: Safe to save changes!\n        SubmitForm(editar_proveedores)\n    ),\n    \n    // 4. Form is invalid\n    Notify(\"Por favor, llene todos los campos obligatorios.\", NotificationType.Error)\n)"
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Text: ="Guardar Cambios"
                  Visible: =varEditarProveedor
                  Width: =238
                  X: =324
                  Y: =359
