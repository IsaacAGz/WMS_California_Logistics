            - agregar_proveedor:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =varGlobal_Fuente_Principal
                  FontWeight: =FontWeight.Bold
                  Height: =37
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: "=If(\n    editar_proveedores.Valid,\n    \n    // 1. Check for duplicates, but ignore the item we are currently editing\n    If(\n        !IsBlank(\n            LookUp(\n                WMS_Catalogo_Proveedor, \n                'Title' = campo_nombre_proveedor.Text &&\n                (editar_proveedores.Mode = FormMode.New || ID <> varProvedorSeleccionado.ID)\n            )\n        ),\n        \n        // 2. TRUE action: Duplicate found!\n        Notify(\n            \"Error: Ya existe un proveedor con este Nombre\", \n            NotificationType.Error\n        ),\n        \n        // 3. FALSE action: Safe to save.\n        SubmitForm(editar_proveedores);\n        UpdateContext({varEditarProveedor: false})\n    ),\n    \n    // 4. Form is invalid\n    Notify(\"Por favor, llene todos los campos obligatorios.\", NotificationType.Error)\n)"
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Text: ="Agregar Proveedor"
                  Visible: =varAgregarProveedor
                  Width: =238
                  X: =324
                  Y: =359
            - borrar:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =varGlobal_Fuente_Principal
                  FontWeight: =FontWeight.Bold
                  Height: =37
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: |-
                    =// 1. First, remove the record from SharePoint
                    Remove(WMS_Catalogo_Proveedor, varProvedorSeleccionado);

                    // 2. Next, completely reset and prepare the form for a brand-new entry
                    ResetForm(editar_proveedores);
                    NewForm(editar_proveedores);

                    // 3. Update all your visibility variables at the exact same time
                    UpdateContext({
                        varAgregarProveedor: true,
                        varEditarProveedor: false
                    })
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Text: ="Borrar"
                  Visible: =varEditarProveedor
                  Width: =238
                  X: =324
                  Y: =299
            - guardar_cambios:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
