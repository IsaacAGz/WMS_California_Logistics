                  Y: =12
            - 01_Button_Registrar_Entrada:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =varGlobal_Fuente_Principal
                  Height: =50
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: "=If(\n    IsBlank(cmbNombreCliente.Selected.Nombre_Cliente),\n    Notify(\"Falta seleccionar cliente\", NotificationType.Error),\n    If(\n        IsBlank(cmbNombreProveedor.Selected.Nombre),\n        Notify(\"Falta seleccionar proveedor\", NotificationType.Error),\n        If(\n            IsBlank(txtTotalBultos.Value) || txtTotalBultos.Value <= 0,\n            Notify(\"Falta cantidad de bultos\", NotificationType.Error),\n\n            // --- 1. Create the Main Entry Header ---\n            // Changed to varEntradaActual to maintain global state\n            Set(\n                varEntradaActual,\n                Patch(\n                    WMS_Ordenes_Entrantes,\n                    Defaults(WMS_Ordenes_Entrantes),\n                    {\n                        Numero_Entrada: \"Pendiente\",\n                        Nombre_Cliente: cmbNombreCliente.Selected.Nombre_Cliente,\n                        Nombre_Proveedor: cmbNombreProveedor.Selected.Nombre,\n                        Cantidad_bultos: txtTotalBultos.Value,\n                        Fecha_Entrada: Now(),\n                        Estado: \"En almacén\",\n                        Estado_Detalle: \"Pendiente\",\n                        Observaciones: cmbObservaciones.Text\n                    }\n                )\n            );\n\n            // --- 2. Generate Serial Number Codes ---\n            Set(\n                varNumeroEntrada,\n                \"ENT-\" & Text(Today(), \"mmddyy\") & \"-\" & Text(varEntradaActual.ID, \"0000\")\n            );\n\n            // --- 3. Update Title tracking code & refresh our global variable ---\n            // We wrap this patch in a Set() so varEntradaActual gets the real \"Numero_Entrada\" value\n            Set(\n                varEntradaActual,\n                Patch(\n                    WMS_Ordenes_Entrantes,\n                    varEntradaActual,\n                    {\n                        Numero_Entrada: varNumeroEntrada\n                    }\n                )\n            );\n\n            Notify(\n                \"Entrada registrada correctamente: \" & varNumeroEntrada,\n                NotificationType.Success\n            );\n\n            UpdateContext({varMostrarPopupDetalle: true})\n            \n        )\n    )\n)"
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Text: ="Registrar Entrada"
                  Width: =235
                  X: =1016
                  Y: =214
