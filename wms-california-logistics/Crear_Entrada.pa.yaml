                  FocusedBorderThickness: =4
                  Height: =52
                  HoverFill: =RGBA(0, 0, 0, 0)
                  Icon: =Icon.Home
                  OnSelect: |-
                    =If(
                        // 1. Condition: Check if ANY of the fields are NOT blank
                        !IsBlank(cmbNombreCliente.Selected) || 
                        !IsBlank(cmbNombreProveedor.Selected),

                        // 2. True Action: If fields are filled, trigger the confirmation pop-up
                        UpdateContext({
                            varSalirPantallaPrincipal: false,
                            varSalirAtras: true,
                            varConfirmarSalida: true
