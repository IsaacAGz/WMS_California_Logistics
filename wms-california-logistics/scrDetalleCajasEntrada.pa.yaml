                  OnSelect: "=// 1. Check if anything changed\nIf(\n    CountRows(colCajasBorradas) > 0 Or \n    CountRows(Filter(colDetalleCajasStaging, IsBlank(ID) Or ID = 0)) > 0 Or\n    CountRows(colDetalleCajasStaging) <> varTotalCajasOriginales,\n\n    // PATH A: Changes exist -> Show popup\n    UpdateContext({\n        varSalirAtras: false,\n        varSalirPantallaPrincipal: true,\n        varConfirmarSalida: true\n    }),\n\n    // PATH B: No changes made -> Restore original status and auto-exit\n    Patch(\n        WMS_Ordenes_Entrantes, \n        varEntradaActual, \n        { \n            Estado_Detalle: If(\n                varEstadoDetalleOriginal = \"Completo\", \n                \"Completo\", \n                \"Pendiente\"\n            )\n        }\n    );\n    \n    // Clean up memory\n    Set(varNumeroEntrada, Blank());\n    Set(varEstadoDetalleOriginal, Blank());\n    Set(varTotalCajasOriginales, Blank());\n    Clear(colDetalleCajasStaging);\n    Clear(colCajasBorradas);\n    Navigate(Pantalla_Inicio, ScreenTransition.CoverRight)\n)"
