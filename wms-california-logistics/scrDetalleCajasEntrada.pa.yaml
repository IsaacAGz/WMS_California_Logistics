      - ver_detalles_agregados_conenedor:
          Control: GroupContainer
          Variant: ManualLayout
          Properties:
            Fill: =varGlobal_Fill_Contenedor
            Height: =390
            RadiusBottomLeft: =20
            RadiusBottomRight: =20
            RadiusTopLeft: =20
            RadiusTopRight: =20
            Width: =1320
            X: =23
            Y: =340
          Children:
            - btnGuardarCaja_2:
                Control: Classic/Button
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varGlobal_Color_Principal
                  Font: =varGlobal_Fuente_Principal
                  FontWeight: =FontWeight.Bold
                  Height: =37
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(Self.Fill, -20%)
                  OnSelect: |
                    =// 1. Delete any removed boxes from the live data source using their IDs
                    If(
                        CountRows(colCajasBorradas) > 0,
                        Remove(
                            WMS_Detalle_Cajas, 
                            Filter(WMS_Detalle_Cajas, ID in colCajasBorradas.ID)
                        );
                        Clear(colCajasBorradas)
                    );
                    // 2.A Bulk CREATE (New boxes with ID = 0 or blank)
                    // We use Coalesce to guarantee a number is sent to SharePoint, preventing null-pointer database errors.
                    Patch(
                        WMS_Detalle_Cajas,
                        ForAll(
                            Filter(colDetalleCajasStaging, IsBlank(ID) || ID <= 0) As _newCaja,
                            {
                                Numero_Entrada: Coalesce(varEntradaActual.Numero_Entrada, "PENDIENTE"), 
                                Numero_Caja: Coalesce(Value(_newCaja.Numero_Caja), 0),
                                Total_cajas: Coalesce(Value(_newCaja.Total_cajas), 0),
                                Alto: Coalesce(Value(_newCaja.Alto), 0),
                                Largo: Coalesce(Value(_newCaja.Largo), 0),
                                Ancho: Coalesce(Value(_newCaja.Ancho), 0),
                                Guia: Coalesce(_newCaja.Guia, ""),
                                Bulto: Coalesce(_newCaja.Bulto, ""),
                                Fecha_Registro: Today(),
                                Cliente: Coalesce(_newCaja.Cliente, "")
                            }
                        )
                    );

                    // 2.B Bulk UPDATE (Existing boxes with valid IDs)
                    Patch(
                        WMS_Detalle_Cajas,
                        ForAll(
                            Filter(colDetalleCajasStaging, ID > 0) As _oldCaja,
                            {
                                ID: _oldCaja.ID,
                                Numero_Entrada: Coalesce(_oldCaja.Numero_Entrada, varEntradaActual.Numero_Entrada),
                                Numero_Caja: Coalesce(Value(_oldCaja.Numero_Caja), 0),
                                Total_cajas: Coalesce(Value(_oldCaja.Total_cajas), 0),
                                Alto: Coalesce(Value(_oldCaja.Alto), 0),
                                Largo: Coalesce(Value(_oldCaja.Largo), 0),
                                Ancho: Coalesce(Value(_oldCaja.Ancho), 0),
                                Guia: Coalesce(_oldCaja.Guia, ""),
                                Bulto: Coalesce(_oldCaja.Bulto, ""),
                                Fecha_Registro: Today(),
                                Cliente: Coalesce(_oldCaja.Cliente, "")
                            }
                        )
                    );

                    // 3. Update the Parent Header Status based on count
                    If(
                        !IsBlank(varEntradaActual),
                        Patch(
                            WMS_Ordenes_Entrantes,
                            varEntradaActual,
                            {
                                Estado_Detalle: If(
                                    CountRows(colDetalleCajasStaging) >= Value(varEntradaActual.Cantidad_bultos),
                                    "Completo",
                                    "Pendiente"
                                )
                            }
                        )
                    );

                    // 4. Clear the staging collection
                    Clear(colDetalleCajasStaging);

                    // 5. Notify the user
                    Notify("¡Detalle de bultos guardado exitosamente!", NotificationType.Success);

                    // 6. Clean up global state variables to prevent data bleed
                    Set(varEstadoDetalleOriginal, Blank());
                    Set(varNumeroEntrada, Blank());
                    Set(varEntradaActual, Blank());

                    Navigate(Entradas, ScreenTransition.CoverRight)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Text: ="Finalizar captura"
                  Width: =238
