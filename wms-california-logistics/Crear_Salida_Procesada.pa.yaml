                  Fill: =RGBA(0,0,0,0)
                  Height: =319
                  Items: |-
                    =Search(
                        Filter(
                            WMS_Ordenes_Entrantes, 
                            Estado_Detalle = "Completo" And IsBlank(Fecha_Salida)
                        ),
                        buscador_entradas_1.Text,
                        Numero_Entrada, Nombre_Cliente
                    )
                  OnSelect: |-
                    =// 1. Look for an exact match in your collection using the unique entry number
                    UpdateContext({
                        varExisteEnColeccion: LookUp(ColectarEntradas, Numero_Entrada = ThisItem.Numero_Entrada)
                    });

                    // 2. Toggle item presence: Remove it if it exists, otherwise add it to the selection basket
                    If(
                        !IsBlank(varExisteEnColeccion),
                        Remove(ColectarEntradas, varExisteEnColeccion),
                        Collect(ColectarEntradas, ThisItem)
                    )
                  Width: =1325
