                        Font: =Font.'Segoe UI'
                        FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                        Height: =29
                        Text: |-
                          ="Fecha de Creacion: " & ThisItem.Fecha_Entrada
                        Width: =380
                        X: =272
                        Y: =30
                  - NextArrow4:
                      Control: Classic/Icon
                      Properties:
                        AccessibleLabel: =Self.Tooltip
                        BorderColor: =RGBA(0, 0, 0, 1)
                        Color: =RGBA(0, 0, 0, 1)
                        DisabledBorderColor: =RGBA(56, 56, 56, 1)
                        DisabledColor: =RGBA(119, 119, 119, 1)
                        Height: =50
                        Icon: =Icon.Edit
                        OnSelect: |-
                          =// 1. Set tracking variables using your global naming conventions
                          Set(varModoEditarDetalleEntrada, false);
                          Set(varNumeroEntrada, ThisItem.Numero_Entrada); // Match field name (usually Numero_Entrada, not Title)
                          Set(varTotalCajas, ThisItem.Cantidad_bultos);

                          // 2. CRITICAL FIX: Use varEntradaActual to align with save/cancel code
                          Set(varEntradaActual, ThisItem); 

                          // 3. CRITICAL FIX: Save original status before changing it to "En captura"
                          Set(varEstadoDetalleOriginal, ThisItem.Estado_Detalle);

                          // 4. CRITICAL FIX: Pull existing box rows (if any exist) into your staging sandbox
                          // If it's truly pending, it might have a few partial rows already saved that need to load
                          If(
                              IsEmpty(colDetalleCajasStaging),
                              ClearCollect(
                                  colDetalleCajasStaging, 
                                  Filter(WMS_Detalle_Cajas, Numero_Entrada = ThisItem.Numero_Entrada)
                              );
                              Set(varTotalCajasOriginales, CountRows(colDetalleCajasStaging))
                          );

                          // 5. Safely change status to lock it for active capture
                          Patch(
                              WMS_Ordenes_Entrantes, 
                              varEntradaActual, 
                              { Estado_Detalle: "En captura" }
                          );

                          // 6. UI cleanup and navigation routing
                          Reset(buscador_pendientes);
                          Navigate(scrDetalleCajasEntrada, ScreenTransition.Cover)
                        PaddingBottom: =16
                        PaddingLeft: =16
                        PaddingRight: =16
                        PaddingTop: =16
                        Tooltip: ="Ver los detalles del elemento"
                        Width: =102
                        X: =620
                        Y: =9
